<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="loomGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"></stop>
      <stop offset="100%" stop-color="#7C4DFF"></stop>
    </linearGradient>
  </defs>

  <!-- Background (optional, remove if VSCode handles it) -->
  <rect x="8" y="8" width="112" height="112" rx="20" fill="#1E1E1E"></rect>

  <!-- Vertical threads -->
  <g stroke="url(#loomGradient)" stroke-width="6" stroke-linecap="round">
    <line x1="40" y1="28" x2="40" y2="100"></line>
    <line x1="64" y1="28" x2="64" y2="100"></line>
    <line x1="88" y1="28" x2="88" y2="100"></line>
  </g>

  <!-- Horizontal weaving -->
  <g stroke="url(#loomGradient)" stroke-width="6" stroke-linecap="round">
    <path d="M28 44 C40 44, 40 56, 52 56 C64 56, 64 44, 76 44 C88 44, 88 56, 100 56"></path>
    <path d="M28 72 C40 72, 40 84, 52 84 C64 84, 64 72, 76 72 C88 72, 88 84, 100 84"></path>
  </g>

  <!-- Subtle L shape overlay -->
  <path d="M36 28 L36 96 L96 96" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.15"></path>
</svg>