<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  
  <!-- Bottom shadow/base -->
  <ellipse cx="8" cy="13.2" rx="5.5" ry="1.6" fill="#7D4620"></ellipse>
  <ellipse cx="8" cy="13" rx="5" ry="1.2" fill="#9C5E2E"></ellipse>
  
  <!-- Main spool body with color pulse -->
  <rect x="5" y="3" width="6" height="10" fill="#E8791A">
    <animate 
      attributeName="fill" 
      values="#E8791A;#FFD700;#E8791A" 
      dur="2s" 
      repeatCount="indefinite"/>
  </rect>
  
  <!-- Thread lines wrapping around spool (hidden at 16x16) -->
  <g clip-path="url(#spool)">
    <line x1="3" y1="4.5" x2="11" y2="3" stroke="#FFA040" stroke-width="0.7"></line>
    <line x1="3" y1="7" x2="11" y2="5.5" stroke="#FFA040" stroke-width="0.7"></line>
    <line x1="3" y1="9.5" x2="11" y2="8" stroke="#FFA040" stroke-width="0.7"></line>
    <line x1="3" y1="12" x2="11" y2="10.5" stroke="#FFA040" stroke-width="0.7"></line>
  </g>
  <clipPath id="spool"><rect x="5" y="3" width="6" height="10"></rect></clipPath>
  
  <!-- Top of spool -->
  <ellipse cx="8" cy="3.2" rx="5.5" ry="1.6" fill="#7D4620"></ellipse>
  <ellipse cx="8" cy="3" rx="5" ry="1.2" fill="#9C5E2E"></ellipse>
  <ellipse cx="8" cy="3" rx="1.4" ry="0.5" fill="#3A1800"></ellipse>
  
  <!-- Thread tail coming off the spool - animated right to left -->
  <path d="M 11 6 Q 14 5 14 3.5 Q 14 2 12.5 2" stroke="#E8791A" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Move thread from right to left -->
    <animateTransform
      attributeName="transform"
      attributeType="XML"
      type="translate"
      values="0,0; -3,0; 0,0"
      dur="1.5s"
      repeatCount="indefinite"/>
    
    <!-- Subtle wave animation for the thread -->
    <animate 
      attributeName="d" 
      values="M 11 6 Q 14 5 14 3.5 Q 14 2 12.5 2;
              M 11 6 Q 14 5.5 14 3.8 Q 14 2.2 12.5 2;
              M 11 6 Q 14 5 14 3.5 Q 14 2 12.5 2"
      dur="1.5s"
      repeatCount="indefinite"/>
  </path>
  
  <!-- AI Sparkle effects - outside spool for visibility -->
  <g id="sparkles">
    <!-- Sparkle 1 - top right area -->
    <circle cx="13.5" cy="2" r="0.5" fill="#FFD700" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0.3;0.6;0.3" dur="2s" begin="0s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Sparkle 2 - upper left area -->
    <circle cx="3" cy="2.5" r="0.4" fill="#FFF" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="r" values="0.3;0.5;0.3" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
  
</svg>
